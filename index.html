<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unicycle Pointer</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      cursor: crosshair;
      overflow: hidden;
      font-family: sans-serif;
    }

    .img {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
  </style>
</head>
<body>

<script>
  // 👉 PUT YOUR IMAGES IN /images FOLDER
  const images = [
    "images/unicycle1.jpg",
    "images/unicycle2.jpg",
    "images/unicycle3.jpg",
    "images/unicycle4.jpg",
    "images/unicycle5.jpg",
    "images/unicycle6.jpg"
  ];

  function getRandomImage() {
    return images[Math.floor(Math.random() * images.length)];
  }

  function spawnImage(x, y) {
    // remove previous image (pointer-pointer style)
    document.body.innerHTML = "";

    const img = document.createElement("img");
    img.className = "img";

    // random size
    const size = 120 + Math.random() * 220;
    img.style.width = size + "px";

    // random rotation
    const rotation = (Math.random() - 0.5) * 40;
    img.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;

    // position at cursor
    img.style.left = x + "px";
    img.style.top = y + "px";

    // preload image before showing (no flicker)
    const temp = new Image();
    temp.onload = () => {
      img.src = temp.src;
      document.body.appendChild(img);

      // fade in
      requestAnimationFrame(() => {
        img.style.opacity = 1;
      });
    };

    temp.src = getRandomImage();
  }

  document.addEventListener("click", (e) => {
    spawnImage(e.clientX, e.clientY);
  });
</script>

</body>
</html>
